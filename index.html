<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="" type="image/x-icon">
    <title>Contact Manager</title>
</head>
<body>
    <header style="color: aquamarine;background-color: darkslategrey;height: 100px;display: flex;">
        <div><h1>📞 Contact Manager</h1></div>
    </header>

    <!-- addContact div  -->
    <div>
        <h2>Add contact</h2>
        <button id="create">Add contact</button>
    </div>

    <!-- showContact div  -->
    <div>
        <h2>Show contacts</h2>
        <button id="showbtn">Show contacts</button>
    </div>

    <!-- searchContact div  -->
    <div>
        <h2>Search for a contact</h2>
        <button id="searchbtn">Search 🔍</button>
    </div>

    <!-- removeContact div  -->
    <div>
        <h2>Remove a contact</h2>
        <button class="rmbtn">Remove</button>
    </div>

    <!-- statistics div  -->
    <div>
        <h2>Statistics</h2>
        <button class="stabtn">Average age</button>
    </div>
    <script src="contacts.js"></script>
</body>
</html>
